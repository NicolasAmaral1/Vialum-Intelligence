services:
  media:
    build: .
    container_name: vialum-media
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3002
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
      - S3_ENDPOINT=http://vialum-minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_REGION=us-east-1
      - S3_FORCE_PATH_STYLE=true
      - S3_BUCKET=vialum-media
      - S3_PUBLIC_URL=http://76.13.172.17:9000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.media.rule=Host(`api.luminai.ia.br`) && PathPrefix(`/media`)"
      - "traefik.http.routers.media.entrypoints=websecure"
      - "traefik.http.routers.media.tls.certresolver=le"
      - "traefik.http.services.media.loadbalancer.server.port=3002"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - proxy
      - vialumchat-internal

networks:
  proxy:
    external: true
  vialumchat-internal:
    external: true
