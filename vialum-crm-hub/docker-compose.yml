services:
  crm-hub:
    build: .
    container_name: vialum-hub
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3100
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL:-redis://:506hys0hQ7j7q9k8PD9Nva7G2Bg0SyAZ@vialumchat-redis:6379}
    labels:
      - "traefik.enable=true"
      # Primary route: /hub
      - "traefik.http.routers.hub.rule=Host(`api.luminai.ia.br`) && PathPrefix(`/hub`)"
      - "traefik.http.routers.hub.entrypoints=websecure"
      - "traefik.http.routers.hub.tls.certresolver=letsencrypt"
      - "traefik.http.services.hub.loadbalancer.server.port=3100"
      # Backward compatibility: /crm (same service)
      - "traefik.http.routers.crm-compat.rule=Host(`api.luminai.ia.br`) && PathPrefix(`/crm`)"
      - "traefik.http.routers.crm-compat.entrypoints=websecure"
      - "traefik.http.routers.crm-compat.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm-compat.loadbalancer.server.port=3100"
    networks:
      - proxy
      - vialumchat-internal

networks:
  proxy:
    external: true
  vialumchat-internal:
    external: true
