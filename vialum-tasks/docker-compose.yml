services:
  tasks:
    build: .
    container_name: vialum-tasks
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3005
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
      - HUB_SERVICE_URL=http://vialum-crm-hub:3100
      - CHAT_SERVICE_URL=http://vialumchat-api:4000
      - MEDIA_SERVICE_URL=http://vialum-media:3002
      - SWITCH_SERVICE_URL=http://vialum-switch:3004
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - WORKSPACE_PATH=/home/vialum/genesis
      - SHARED_SQUADS_PATH=/workspaces/shared/squads
      - TENANTS_WORKSPACE_PATH=/workspaces/tenants
      - REDIS_URL=${REDIS_URL:-}
      - CHAT_API_KEY=vialum_sk_KH5YaGm5OnEp77wHI69rsf5jP5KG1QHKAesPoef0cozW6iwKiRCjlz6TrCIxHj_h
      - CHAT_INBOX_ID=59e5dc48-a983-422f-80c4-f6ba3ce71e32
    volumes:
      - /root/.claude:/root/.claude:ro
      - /root/.claude.json:/root/.claude.json:ro
      - /root/genesis:/home/vialum/genesis:ro
      - /root/genesis/squads:/workspaces/shared/squads:ro
      - /root/vialum-workspaces:/workspaces/tenants:rw
      - task-outputs:/app/outputs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tasks.rule=Host(`api.luminai.ia.br`) && PathPrefix(`/tasks`)"
      - "traefik.http.routers.tasks.entrypoints=websecure"
      - "traefik.http.routers.tasks.tls.certresolver=le"
      - "traefik.http.services.tasks.loadbalancer.server.port=3005"
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - proxy
      - vialumchat-internal

volumes:
  task-outputs:

networks:
  proxy:
    external: true
  vialumchat-internal:
    external: true
