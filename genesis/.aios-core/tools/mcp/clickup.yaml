tool:
  schema_version: 2.0
  id: clickup
  type: mcp
  name: ClickUp
  version: 1.0.0
  description: ClickUp project management integration (tasks, spaces, folders)
  mcp_specific:
    server_command: "npx -y clickup-mcp-server"
    transport: stdio
    environment_variables:
      - name: CLICKUP_API_TOKEN
        required: true
