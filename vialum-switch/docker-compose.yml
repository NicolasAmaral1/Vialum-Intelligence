services:
  switch:
    build: .
    container_name: vialum-switch
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3004
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
      - MEDIA_SERVICE_URL=http://vialum-media:3002
      - TRANSCRIBER_URL=http://transcriber-api:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.switch.rule=Host(`api.luminai.ia.br`) && PathPrefix(`/switch`)"
      - "traefik.http.routers.switch.entrypoints=websecure"
      - "traefik.http.routers.switch.tls.certresolver=le"
      - "traefik.http.services.switch.loadbalancer.server.port=3004"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - proxy
      - vialumchat-internal

networks:
  proxy:
    external: true
  vialumchat-internal:
    external: true
