services:
  genesis-form-laudos:
    container_name: genesis-form-laudos
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CLICKUP_API_TOKEN=${CLICKUP_API_TOKEN}
      - SESSION_SECRET=${SESSION_SECRET}
    # Porta exposta caso prefira acesso direto, além do Traefik.
    ports:
      - "3010:3000"
    volumes:
      - ./data:/app/data
    labels:
      - "traefik.enable=true"
      # Forçar Traefik a usar a rede proxy (se aplicável na sua VPS)
      - "traefik.docker.network=proxy"
      # Router HTTPS (Exemplo de URL: laudos.luminai.ia.br)
      - "traefik.http.routers.genesis-form-laudos.rule=Host(`laudos.luminai.ia.br`)"
      - "traefik.http.routers.genesis-form-laudos.entrypoints=websecure"
      - "traefik.http.routers.genesis-form-laudos.tls.certresolver=le"
      # Router HTTP (redirect)
      - "traefik.http.routers.genesis-form-laudos-http.rule=Host(`laudos.luminai.ia.br`)"
      - "traefik.http.routers.genesis-form-laudos-http.entrypoints=web"
      # Serviço
      - "traefik.http.services.genesis-form-laudos.loadbalancer.server.port=3000"
    networks:
      - proxy

networks:
  proxy:
    external: true
